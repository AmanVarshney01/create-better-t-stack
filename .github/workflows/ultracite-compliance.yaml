name: Ultracite Compliance

# Scaffolds every major stack combination with the ultracite (oxlint) addon
# and asserts the generated code passes `ultracite check` and typechecks.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/template-generator/**"
      - "apps/cli/src/helpers/addons/ultracite-setup.ts"
      - "apps/cli/test/ultracite-compliance.test.ts"
      - ".github/workflows/ultracite-compliance.yaml"
  workflow_dispatch:

concurrency:
  group: ultracite-compliance-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  compliance:
    name: Scaffold Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          check-latest: true
          package-manager-cache: false

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        env:
          BTS_TELEMETRY: 0

      - name: Build Types
        run: cd packages/types && bun run build

      - name: Build Template Generator
        run: cd packages/template-generator && bun run build

      - name: Run Compliance Matrix
        working-directory: apps/cli
        run: bun test test/ultracite-compliance.test.ts
        env:
          AGENT: 1
          BTS_TELEMETRY: 0
          BTS_ULTRACITE_COMPLIANCE: 1
