name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release to NPM
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          check-latest: true
          registry-url: https://registry.npmjs.org

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | head -n1 | sed -E 's/^chore\(release\): ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Expected semver (x.y.z)"
            exit 1
          fi

      - name: Check if version already exists
        id: check-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view create-js-stack@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on NPM"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.check-version.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        if: steps.check-version.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Verify NPM auth
        if: steps.check-version.outputs.exists == 'false'
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set CLI version and strip bundled workspace deps
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd apps/cli
          jq --arg v "$VERSION" '.version = $v | del(.dependencies["@create-js-stack/types"]) | del(.dependencies["@create-js-stack/template-generator"])' package.json > tmp.json && mv tmp.json package.json

      - name: Build CLI
        if: steps.check-version.outputs.exists == 'false'
        run: cd apps/cli && bun run build
        env:
          CJS_TELEMETRY: 1
          CONVEX_INGEST_URL: ${{ secrets.CONVEX_INGEST_URL }}

      - name: Enable pnpm via corepack
        if: steps.check-version.outputs.exists == 'false'
        run: corepack enable pnpm

      - name: Publish smoke test (npm, pnpm, bun)
        if: steps.check-version.outputs.exists == 'false'
        run: bun run smoke:publish

      - name: Publish CLI to NPM
        if: steps.check-version.outputs.exists == 'false'
        run: cd apps/cli && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CJS_TELEMETRY: 1
          CONVEX_INGEST_URL: ${{ secrets.CONVEX_INGEST_URL }}

      - name: Create and push tag
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --local user.email "riteshintro@gmail.com"
          git config --local user.name "riteshintro"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push --tags
          else
            echo "Tag v$VERSION already exists, skipping"
          fi

      - name: Create GitHub Release
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            bunx changelogithub
          else
            echo "Release v$VERSION already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v$VERSION Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [create-js-stack@$VERSION](https://www.npmjs.com/package/create-js-stack/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "[v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
